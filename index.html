const types=["Normal","Fire","Water","Electric","Grass","Ice","Fighting","Poison","Ground","Flying","Psychic","Bug","Rock","Ghost","Dragon"];

const moveNames = Array.from({length:165},(_,i)=>({
name: realMoveNames[i % realMoveNames.length],
type:types[Math.floor(Math.random()*types.length)],
power:Math.floor(Math.random()*130),
acc:[70,75,80,85,90,95,100][Math.floor(Math.random()*7)],
pp:[5,10,15,20,25,30,35][Math.floor(Math.random()*7)],
eff:Math.floor(Math.random()*10)+1
}));

function shuffle(a){
let arr=a.slice();
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()* (i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function eff(m,t){
if(m==="Fire"&&t==="Grass")return 2;
if(m==="Water"&&t==="Fire")return 2;
if(m==="Electric"&&t==="Water")return 2;
if(m==="Grass"&&t==="Water")return 2;
return 1;
}

function calc(move,atk,def){
let PR=(move.acc===100?10:move.acc/10);
let PP=(move.pp/40)*10;
let EF=move.eff;
let stab=(atk.type1===move.type||atk.type2===move.type)?1.5:1;
let typeEff=eff(move.type,def.type1);
let PT=((move.power||0)*stab*typeEff)/15;
let score=(PR*0.35)+(PT*0.30)+(PP*0.10)+(EF*0.25);
return {PR,PP,EF,PT,score};
}

function generate(){
let ai=pokemonDB[Math.floor(Math.random()*pokemonDB.length)];
let pl=pokemonDB[Math.floor(Math.random()*pokemonDB.length)];

document.getElementById("ai").innerHTML=
`<h3>Pokemon AI</h3>${ai.name}<br>${ai.type1}/${ai.type2||""}`;

document.getElementById("player").innerHTML=
`<h3>Pokemon Player</h3>${pl.name}<br>${pl.type1}/${pl.type2||""}`;

let pool=shuffle(moveNames).slice(0,4);

let results=pool.map(m=>({m,calc:calc(m,ai,pl)}))
.sort((a,b)=>b.calc.score-a.calc.score);

let html="<h2>Mosse IA</h2>";

results.forEach((r,i)=>{
let c=r.calc;
let color=i===0?"#0b6623":i===3?"#5a0f0f":"#2d4f2d";

html+=`
<div class="move ${i===0?"best":""}" style="background:${color}">
<b>${r.m.name}</b> ${i===0?"🔥 BEST MOVE":""}<br>
PR:${c.PR.toFixed(1)} |
PT:${c.PT.toFixed(1)} |
PP:${c.PP.toFixed(1)} |
EF:${c.EF}<br>
Score:${c.score.toFixed(2)}
</div>`;
});

document.getElementById("moves").innerHTML=html;
}
